name: Build gwnum benchmark

on:
  workflow_dispatch:
  push:
    tags:
      - 'gwnum-v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            gwnum_make: make64
            cc_flags: "-DX86_64 -std=gnu99"
            link_flags: "-lm -lpthread -lstdc++ -lgmp -static"
          - os: macos-26-intel
            platform: macos-amd64
            gwnum_make: makemac
            cc_flags: "-DX86_64 -std=gnu99"
            link_flags: "-lm -lpthread -lstdc++ -lgmp"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - name: Checkout armcrunch
        uses: actions/checkout@v4

      - name: Clone Prime95
        run: git clone --depth 1 https://github.com/shafferjohn/Prime95.git /tmp/Prime95

      - name: Install GMP (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev

      - name: Install GMP (macOS)
        if: runner.os == 'macOS'
        run: brew install gmp

      - name: Build gwnum library
        working-directory: /tmp/Prime95/gwnum
        run: make -f ${{ matrix.gwnum_make }}

      - name: Build gwnum_bench
        run: |
          GMP_PREFIX=""
          if [ "$RUNNER_OS" = "macOS" ]; then
            GMP_PREFIX=$(brew --prefix gmp)
          fi
          # On macOS 26 the new linker may reject old pre-built assembly
          # objects from macosx64/gwnum.a, so try -Wl,-ld_classic first
          # (legacy linker compatible with older object formats).
          LINK_SUCCESS=false
          for EXTRA_FLAGS in "-Wl,-ld_classic" ""; do
            if gcc -O2 \
              -I/tmp/Prime95/gwnum -I/tmp/Prime95 \
              ${{ matrix.cc_flags }} \
              ${GMP_PREFIX:+-I$GMP_PREFIX/include} \
              -o gwnum_bench-${{ matrix.platform }} \
              app/bench/gwnum_bench.c \
              /tmp/Prime95/gwnum/gwnum.a \
              ${GMP_PREFIX:+-L$GMP_PREFIX/lib} \
              ${{ matrix.link_flags }} \
              $EXTRA_FLAGS 2>&1; then
              echo "Linked successfully${EXTRA_FLAGS:+ with $EXTRA_FLAGS}"
              LINK_SUCCESS=true
              break
            else
              echo "Link failed${EXTRA_FLAGS:+ with $EXTRA_FLAGS}, trying next..."
            fi
          done
          if [ "$LINK_SUCCESS" = false ]; then
            echo "All link attempts failed"
            exit 1
          fi
          strip gwnum_bench-${{ matrix.platform }} || true
          ls -lh gwnum_bench-${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gwnum_bench-${{ matrix.platform }}
          path: gwnum_bench-${{ matrix.platform }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/gwnum-v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: gwnum_bench-*
          body: |
            Pre-built gwnum_bench binaries for benchmarking gwnum modular squaring.

            | Binary | Platform | Notes |
            |--------|----------|-------|
            | `gwnum_bench-linux-amd64` | Linux x86_64 | Static binary, uses AVX2 assembly FFT |
            | `gwnum_bench-macos-amd64` | macOS x86_64 | Runs on Intel Macs or Apple Silicon via Rosetta |

            Usage: `./gwnum_bench-<platform> [--k K] [--n N] [--iters ITERS]`