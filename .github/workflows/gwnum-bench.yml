name: Build gwnum benchmark

on:
  workflow_dispatch:
  push:
    tags:
      - 'gwnum-v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            gwnum_make: make64
            cc_flags: "-DX86_64 -std=gnu99"
            link_flags: "-lm -lpthread -lstdc++ -lgmp -static"
          - os: macos-26-intel
            platform: macos-amd64
            gwnum_make: makemac
            cc_flags: "-DX86_64 -std=gnu99"
            link_flags: "-lm -lpthread -lstdc++ -lgmp"
          - os: macos-26
            platform: macos-arm64
            gwnum_make: makemac
            cc_flags: "-std=gnu99"
            link_flags: "-lm -lpthread -lstdc++ -lgmp"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - name: Checkout armcrunch
        uses: actions/checkout@v4

      - name: Clone Prime95
        run: git clone --depth 1 https://github.com/shafferjohn/Prime95.git /tmp/Prime95

      - name: Install GMP (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev

      - name: Install GMP (macOS)
        if: runner.os == 'macOS'
        run: brew install gmp

      - name: Build gwnum library and benchmark
        run: |
          GWNUM_DIR=/tmp/Prime95/gwnum
          cd "$GWNUM_DIR"

          GMP_INC=""
          GMP_LIB=""
          if [ "$RUNNER_OS" = "macOS" ]; then
            GMP_PREFIX=$(brew --prefix gmp)
            GMP_INC="-I$GMP_PREFIX/include"
            GMP_LIB="-L$GMP_PREFIX/lib"
          fi

          try_link() {
            gcc -O2 \
              -I"$GWNUM_DIR" -I/tmp/Prime95 \
              ${{ matrix.cc_flags }} $GMP_INC \
              -o "$GITHUB_WORKSPACE/gwnum_bench-${{ matrix.platform }}" \
              "$GITHUB_WORKSPACE/app/bench/gwnum_bench.c" \
              "$GWNUM_DIR/gwnum.a" \
              $GMP_LIB ${{ matrix.link_flags }} 2>&1
          }

          # Phase 1: try standard makefile build + link
          DONE=false
          if make -f ${{ matrix.gwnum_make }} 2>/dev/null && try_link; then
            echo "Built and linked with ${{ matrix.gwnum_make }} (assembly FFT)"
            DONE=true
          fi

          # Phase 2: C-only fallback if phase 1 failed
          if [ "$DONE" = false ]; then
            echo "Falling back to C-only build..."
            rm -f *.o gwnum.a

            # cpuid.c: x86 inline asm fails on ARM64
            if ! gcc -I.. -I../sqlite-amalgamation-3420000 ${{ matrix.cc_flags }} -O2 -c cpuid.c 2>/dev/null; then
              echo "  cpuid.c: using stub (x86 asm not available)"
              printf '%s\n' \
                '#include <string.h>' \
                'char CPU_BRAND[49] = "ARM64";' \
                'double CPU_SPEED = 3000.0;' \
                'unsigned int CPU_FLAGS = 0;' \
                'unsigned int CPU_CORES = 1;' \
                'unsigned int CPU_HYPERTHREADS = 1;' \
                'int CPU_L1_CACHE_SIZE = 32768;' \
                'int CPU_L2_CACHE_SIZE = 1048576;' \
                'int CPU_L3_CACHE_SIZE = -1;' \
                'int CPU_L1_CACHE_LINE_SIZE = 64;' \
                'int CPU_L2_CACHE_LINE_SIZE = 64;' \
                'int CPU_L3_CACHE_LINE_SIZE = -1;' \
                'int CPU_L1_DATA_TLBS = -1;' \
                'int CPU_L2_DATA_TLBS = -1;' \
                'int CPU_L3_DATA_TLBS = -1;' \
                'int CPU_L1_SET_ASSOCIATIVE = -1;' \
                'int CPU_L2_SET_ASSOCIATIVE = -1;' \
                'int CPU_L3_SET_ASSOCIATIVE = -1;' \
                'unsigned int CPU_SIGNATURE = 0;' \
                'int CPU_ARCHITECTURE = 0;' \
                'void one_hundred_thousand_clocks(void) {}' \
                'void one_million_clocks(void) {}' \
                'void guessCpuType(void) {}' \
                'void guessCpuSpeed(void) {}' \
                > cpuid_stub.c
              gcc ${{ matrix.cc_flags }} -O2 -c cpuid_stub.c -o cpuid.o
            fi
            gcc -I.. -I../sqlite-amalgamation-3420000 ${{ matrix.cc_flags }} -O2 -c gwnum.c
            gcc -I.. -I../sqlite-amalgamation-3420000 ${{ matrix.cc_flags }} -O2 -c gwtables.c
            g++ -I.. -I../qd -std=c++11 -O2 -D'__builtin_ia32_pause()=' -c gwthread.cpp
            gcc -I.. -I../sqlite-amalgamation-3420000 ${{ matrix.cc_flags }} -O2 -c gwini.c
            gcc -I.. -I../sqlite-amalgamation-3420000 ${{ matrix.cc_flags }} -O2 -c gwbench.c
            gcc -I.. -I../sqlite-amalgamation-3420000 ${{ matrix.cc_flags }} -O2 -c gwutil.c
            g++ -I.. -I../qd -std=c++11 -O2 -c gwdbldbl.cpp
            gcc -I.. -I../sqlite-amalgamation-3420000 ${{ matrix.cc_flags }} -O2 -c giants.c
            gcc -I.. -I../sqlite-amalgamation-3420000 ${{ matrix.cc_flags }} -O2 -c radix.c
            gcc -I.. -I../sqlite-amalgamation-3420000 ${{ matrix.cc_flags }} -O2 $GMP_INC -c ecmstag1.c
            ar -rs gwnum.a cpuid.o gwnum.o gwtables.o gwthread.o gwini.o gwbench.o gwutil.o gwdbldbl.o giants.o radix.o ecmstag1.o
            echo "  C-only gwnum.a built"
            try_link
            echo "  Linked successfully (C-only FFT)"
          fi

          strip "$GITHUB_WORKSPACE/gwnum_bench-${{ matrix.platform }}" || true
          ls -lh "$GITHUB_WORKSPACE/gwnum_bench-${{ matrix.platform }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gwnum_bench-${{ matrix.platform }}
          path: gwnum_bench-${{ matrix.platform }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/gwnum-v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gwnum_bench-linux-amd64/gwnum_bench-linux-amd64
            gwnum_bench-macos-amd64/gwnum_bench-macos-amd64
            gwnum_bench-macos-arm64/gwnum_bench-macos-arm64
          body: |
            Pre-built gwnum_bench binaries for benchmarking gwnum modular squaring.

            | Binary | Platform | Notes |
            |--------|----------|-------|
            | `gwnum_bench-linux-amd64` | Linux x86_64 | Static binary, uses AVX2 assembly FFT |
            | `gwnum_bench-macos-amd64` | macOS x86_64 | Runs on Intel Macs or Apple Silicon via Rosetta |
            | `gwnum_bench-macos-arm64` | macOS ARM64 | Native Apple Silicon, C-only FFT (no x86 assembly) |

            Usage: `./gwnum_bench-<platform> [--k K] [--n N] [--iters ITERS]`